<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /* box-level */
            background-color: lightgray;

            height: 80px;
            width: 300px;

            /*
            "border-width: 5px;
            border-style: solid;
            border-color: darkslategray;"

            Tudo isso acima é = "border: 5px solid darkslategray"
            */

            border: 5px solid darkslategray;
            
            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            
            Tudo isso acima é = "padding: 10px" ou "padding: 10px 10px 10px 10px" E assim em "margin" e em "outline" também...
            */

            padding: 10px;


            margin-top: 10px;
            margin-right: auto; /* para centralizar */
            margin-bottom: 10px;
            margin-left: auto;

            outline-width: 3px;
            outline-style: dashed;
            outline-color: red;
        }

        a { /* inline-leve */
            border-width: 4px;
            border-style: solid;
            border-color: red;

            padding-top: 5px;
            padding-right: 5px;
            padding-bottom: 5px;
            padding-left: 5px;

         
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
