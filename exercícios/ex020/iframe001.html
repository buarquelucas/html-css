<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>

    <style>
        /* TAMANHO PADRÃO DO IFRAME: 300x150px */
        iframe {
            width: 400px;
            height: 400px;
            border: 2px solid black;
        }

    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do 
        
        <iframe src="https://www.cursoemvideo.com" frameborder="0">

            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>
            <!-- Colocar <a> com link para caso o navegador seja incompativel com o iframe, aparecerá o hiperlink -->
        </iframe>
        
        para aprender a programar
    </p>
    
</body>
</html>
